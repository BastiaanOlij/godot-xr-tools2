# Publish Demo workflow
name: Publish Demo

# Trigger rules (adjust to configure when CI is performed)
on:
  release:
    # We'll run this workflow when a new GitHub release is created
    types: [published]
  workflow_dispatch: {}

# Environment variables
env:
  # Configure Godot version
  GODOT_VERSION: 4.6.1

  # OpenXR Vendors version
  OPENXR_VENDORS_VERSION: 4.3.0-stable
  
  # We haven't set up an itch.io page for this yet
  # Butler API Key (comment to disable)
  # BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
  
  # Butler User/Game (set to itch.io user/game)
  # BUTLER_USER_GAME: godot-xr/godot-xr-tools-demo

# CI jobs
jobs:
  # Build job (Matrix build for all exports)
  build:
    name: Building for ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: true
      matrix:
        include:
          # Export for Windows
          - name: 🏁 Windows
            os: windows-latest
            platform: windows
            export-preset: Windows
            export-type: release
            export-folder: build/windows
            archive: Windows
            butler-channel: windows
            vendor-plugin: false

          # Export for Linux
          - name: 🐧 Linux
            os: ubuntu-22.04
            platform: linux
            export-preset: Linux
            export-type: release
            export-folder: build/linux
            archive: Linux
            butler-channel: linux
            vendor-plugin: false

          # Export for AndroidXR
          - name: 🤖 AndroidXR
            os: ubuntu-22.04
            platform: android
            export-preset: AndroidXR
            export-type: debug
            export-args: --install-android-build-template
            export-folder: build/androidxr
            archive: AndroidXR
            butler-channel: androidxr
            vendor-plugin: true

          # Export for Meta Quest
          - name: 🤖 Meta Quest
            os: ubuntu-22.04
            platform: android
            export-preset: Quest
            export-type: debug
            export-args: --install-android-build-template
            export-folder: build/meta-quest
            archive: Meta-Quest
            butler-channel: meta-quest
            vendor-plugin: true

          # Export for Pico
          - name: 🤖 Pico
            os: ubuntu-22.04
            platform: android
            export-preset: Pico
            export-type: debug
            export-args: --install-android-build-template
            export-folder: build/pico
            archive: Pico
            butler-channel: pico
            vendor-plugin: true

          # Export for Android Khronos
          - name: 🤖 Android Khronos
            os: ubuntu-22.04
            platform: android
            export-preset: Android Khronos
            export-type: debug
            export-args: --install-android-build-template
            export-folder: build/android-khronos
            archive: Android-Khronos
            butler-channel: android-khronos
            vendor-plugin: true

          # Export for Steam Frame
          - name: 🤖 Steam Frame
            os: ubuntu-22.04
            platform: linux
            export-preset: Steam Frame
            export-type: release
            export-folder: build/steam-frame
            archive: Steam-Frame
            butler-channel: steam-frame
            vendor-plugin: false

    steps:
      # Check out the repository
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      # Install the OpenXR Vendors Plugin
      - name: Install OpenXR Vendors Plugin
        shell: bash
        if: matrix.vendor-plugin
        run: |
          curl -L -O https://github.com/GodotVR/godot_openxr_vendors/releases/download/${{ env.OPENXR_VENDORS_VERSION }}/godotopenxrvendorsaddon.zip
          unzip -o godotopenxrvendorsaddon.zip -d godotopenxrvendorsaddon
          mkdir -p addons
          mv godotopenxrvendorsaddon/asset/addons/godotopenxrvendors addons/godotopenxrvendors
          rm godotopenxrvendorsaddon.zip
          rm -rf godotopenxrvendorsaddon

      # If targeting android then install JDK
      - name: Set up JDK 17
        if: matrix.platform == 'android'
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      # If targeting android then install Android SDK
      - name: Setup Android SDK
        if: matrix.platform == 'android'
        uses: android-actions/setup-android@v4

      # If targeting android then install Android SDK Packages
      - name: Install Android SDK Packages
        if: matrix.platform == 'android'
        run: >
          sdkmanager
          "platform-tools"
          "build-tools;34.0.0"
          "platforms;android-34"
          "cmdline-tools;latest"
          "cmake;3.10.2.4988404"
          "ndk;23.2.8568313"

      # Setup Godot
      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ env.GODOT_VERSION }}
          use-dotnet: false
          include-templates: true

      # Import Godot Project
      - name: Initial Godot Import
        shell: bash
        run: |
          godot --headless --verbose --import || exit 0

      # Export project
      - name: Export Godot Project
        shell: bash
        run: |
          godot --headless ${{ matrix.export-args }} --export-${{ matrix.export-type }} "${{ matrix.export-preset }}" || exit 0

      # Upload artifacts
      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.archive }}-Artifacts
          path: |
            ${{ matrix.export-folder }}/*.*
            !**/.gitignore

      # Note, we're skipping butler steps for now

      # Compress project (if building release)
      - name: Compress Project
        run: |
          cd ${{ matrix.export-folder }}
          7z a -tzip ${{ matrix.archive }}.zip *.* -x'!.gitignore'

      # Publish release (if building release)
      - name: Publish Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags')
        uses: ncipollo/release-action@v1
        with:
          draft: true
          allowUpdates: true
          artifacts: '${{ matrix.export-folder }}/${{ matrix.archive }}.zip'
          omitNameDuringUpdate: true
          omitBodyDuringUpdate: true
          omitDraftDuringUpdate: true
          omitPrereleaseDuringUpdate: true
          token: ${{ secrets.GITHUB_TOKEN }}
